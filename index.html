<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layer7 - DSTAT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              glass: 'rgba(255, 255, 255, 0.03)',
              glassBorder: 'rgba(255, 255, 255, 0.08)',
              accent1: '#8b5cf6',
              accent2: '#3b82f6',
            }
          }
        }
      }
    </script>
    
    <style>
      body {
        background-color: #0f172a;
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
          radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
        color: #f8fafc;
        margin: 0;
        min-height: 100vh;
      }

      .glass-panel {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      
      @keyframes pulse-ring {
        0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
      }
      
      .status-dot {
        width: 10px;
        height: 10px;
        background-color: #10b981;
        border-radius: 50%;
        animation: pulse-ring 2s infinite;
      }

      .status-dot.offline {
        background-color: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        animation: none;
      }
    </style>
  </head>

  <body class="p-4 sm:p-8 flex flex-col items-center justify-center">
    
    <div id="toast" class="fixed top-5 right-5 transform translate-x-[150%] transition-transform duration-300 bg-emerald-500/90 backdrop-blur border border-emerald-400 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
      <span class="font-medium text-sm tracking-wide">已复制到剪贴板</span>
    </div>

    <div class="w-full max-w-7xl flex flex-col gap-6">
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="glass-panel rounded-2xl p-6 flex flex-col justify-center relative overflow-hidden">
          <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-accent1 rounded-full blur-[50px] opacity-20 pointer-events-none"></div>
          <h1 class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 mb-4">
            Layer7 DSTAT
          </h1>
          <div class="flex items-center gap-3 bg-black/30 border border-white/5 px-4 py-2 rounded-xl w-max">
            <div id="connection-status-dot" class="status-dot"></div>
            <span id="connection-status-text" class="text-sm font-medium text-gray-200">正在连接...</span>
          </div>
        </div>

        <div class="glass-panel rounded-2xl p-6 flex flex-col justify-center">
          <p class="text-xs text-gray-400 font-semibold tracking-widest uppercase mb-2">当前实时请求数 (RPS)</p>
          <div class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-blue-400 font-mono" id="current-rps">
            0
          </div>
        </div>

        <div class="glass-panel rounded-2xl p-6 flex flex-col justify-center">
          <p class="text-xs text-gray-400 font-semibold tracking-widest uppercase mb-2">数据捕获节点 (TARGET)</p>
          <div class="flex items-center justify-between bg-black/40 border border-white/10 rounded-xl p-1 pl-4">
            <span id="target-url" class="text-sm font-mono text-gray-300 truncate mr-3"></span>
            <button id="copy-btn" class="bg-white/10 hover:bg-white/20 transition-colors border border-white/5 px-4 py-2 rounded-lg text-sm font-medium text-white flex-shrink-0 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
              复制
            </button>
          </div>
        </div>

      </div>

      <div class="glass-panel rounded-2xl p-4 sm:p-6 w-full h-[450px]">
        <div id="chart" class="w-full h-full"></div>
      </div>
      
    </div>

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    
    <script>
      window.onload = () => {
        const statusDot = document.getElementById("connection-status-dot");
        const statusText = document.getElementById("connection-status-text");
        const currentRpsEl = document.getElementById("current-rps");
        const targetUrlEl = document.getElementById("target-url");
        const copyBtn = document.getElementById("copy-btn");
        const toast = document.getElementById("toast");

        const targetPath = location.protocol + "//" + location.host + "/dstat";
        targetUrlEl.innerText = targetPath;

        copyBtn.onclick = () => {
          const textarea = document.createElement("textarea");
          textarea.value = targetPath;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
          
          toast.classList.remove("translate-x-[150%]");
          setTimeout(() => {
            toast.classList.add("translate-x-[150%]");
          }, 3000);
        };

        const updateStatus = (status) => {
          if (status === 'connected') {
            statusDot.classList.remove('offline');
            statusText.innerText = "已连接";
            statusText.classList.replace('text-red-400', 'text-gray-200');
          } else {
            statusDot.classList.add('offline');
            statusText.innerText = "已离线";
            statusText.className = "text-sm font-medium text-red-400";
          }
        };

        const chart = Highcharts.chart("chart", {
          chart: {
            type: "areaspline",
            backgroundColor: "transparent",
            animation: Highcharts.svg, 
            marginRight: 10,
            style: { fontFamily: 'Inter, sans-serif' }
          },
          exporting: {
            enabled: false
          },
          title: { text: null },
          credits: { enabled: false },
          xAxis: {
            type: "datetime",
            tickPixelInterval: 150,
            gridLineWidth: 1,
            gridLineColor: "rgba(255, 255, 255, 0.05)",
            gridLineDashStyle: 'Dash',
            labels: { style: { color: "#94a3b8" } },
            lineColor: "rgba(255, 255, 255, 0.1)"
          },
          yAxis: {
            title: { text: null },
            gridLineColor: "rgba(255, 255, 255, 0.05)",
            labels: { style: { color: "#94a3b8", fontFamily: 'JetBrains Mono, monospace' } },
            min: 0
          },
          tooltip: {
            backgroundColor: "rgba(15, 23, 42, 0.95)",
            borderWidth: 1,
            borderColor: "rgba(255, 255, 255, 0.1)",
            borderRadius: 8,
            style: { color: "#ffffff" },
            headerFormat: '<span style="font-size: 11px; color: #94a3b8">{point.key}</span><br/>',
            pointFormat: '<b>{series.name}</b>: <span style="color:#a78bfa; font-weight:bold; font-family: \'JetBrains Mono\';">{point.y}</span>'
          },
          legend: { enabled: false },
          plotOptions: {
            areaspline: {
              fillColor: {
                linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 },
                stops: [
                  [0, Highcharts.color("#8b5cf6").setOpacity(0.5).get("rgba")],
                  [1, Highcharts.color("#3b82f6").setOpacity(0.0).get("rgba")]
                ]
              },
              marker: {
                radius: 0,
                states: {
                  hover: {
                    radius: 4,
                    fillColor: "#fff",
                    lineColor: "#8b5cf6",
                    lineWidth: 2
                  }
                }
              },
              lineWidth: 3,
              lineColor: {
                linearGradient: { x1: 0, y1: 0, x2: 1, y2: 0 },
                stops: [
                  [0, '#8b5cf6'],
                  [1, '#3b82f6']
                ]
              },
              states: { hover: { lineWidth: 3 } },
              threshold: null
            }
          },
          series: [{
            name: "请求数",
            data: []
          }]
        });

        let ws = new WebSocket(
          (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/"
        );
        
        ws.onopen = () => {
           updateStatus('connected');
        };

        ws.onmessage = (event) => {
          let requests = Number(event.data);
          let time = new Date().getTime();
          
          currentRpsEl.innerText = requests.toLocaleString();
          
          chart.series[0].addPoint([time, requests], true, chart.series[0].points.length > 60);
        };

        ws.onerror = () => {
          updateStatus('offline');
        };
        
        ws.onclose = () => {
           updateStatus('offline');
        };

      };
    </script>
  </body>
</html>
